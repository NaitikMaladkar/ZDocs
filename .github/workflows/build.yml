name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Decode keystore & create local.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/zdocs-release.keystore
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
            # Create local.properties with signing credentials (never committed to git)
            echo "keystore.path=zdocs-release.keystore" >> local.properties
            echo "keystore.store.password=$KEYSTORE_STORE_PASSWORD" >> local.properties
            echo "keystore.key.alias=$KEYSTORE_KEY_ALIAS" >> local.properties
            echo "keystore.key.password=$KEYSTORE_KEY_PASSWORD" >> local.properties
          else
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build Release APK
        if: env.KEYSTORE_AVAILABLE == 'true'
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Debug APK
        if: env.KEYSTORE_AVAILABLE != 'true'
        run: ./gradlew assembleDebug --stacktrace

      - name: Find APK
        id: apk
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "apk_name=ZDocs-v1.0.0-release.apk" >> $GITHUB_OUTPUT
          elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "apk_name=ZDocs-v1.0.0-debug.apk" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No APK found!"
            find app/build -name "*.apk" || true
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZDocs-APK
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.apk_path }}=>${{ steps.apk.outputs.apk_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
